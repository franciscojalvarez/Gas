services:
  postgres:
    image: postgres:15-alpine
    container_name: gasnet_db
    environment:
      POSTGRES_USER: gasnet
      POSTGRES_PASSWORD: gasnet123
      POSTGRES_DB: gasnet
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gasnet"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:

